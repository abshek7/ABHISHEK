<div class="auth-container">
  <nz-row nzJustify="center" nzAlign="middle">
    <nz-col nzXs="24" nzSm="20" nzMd="14" nzLg="10" nzXl="8">

      <nz-card nzTitle="Login">

        <form nz-form [formGroup]="form" (ngSubmit)="submit()" nzLayout="vertical">

          @if (error()) {
          <nz-alert nzType="error" [nzMessage]="error()" nzShowIcon class="mb-16"></nz-alert>
          }

          <!-- Email -->
          <nz-form-item>
            <nz-form-label>Email</nz-form-label>
            <nz-form-control>
              <input nz-input formControlName="email" placeholder="Enter email" />
            </nz-form-control>
          </nz-form-item>

          <!-- Password -->
          <nz-form-item>
            <nz-form-label>Password</nz-form-label>
            <nz-form-control>
              <input nz-input type="password" formControlName="password" placeholder="Enter password" />
            </nz-form-control>
          </nz-form-item>

          <!-- Actions -->
          <div class="auth-actions">
            <button nz-button nzType="primary" type="submit" [nzLoading]="loading()"
              [disabled]="form.invalid || loading()" nzBlock>
              Login
            </button>

            <div class="register-link">

              <a routerLink="/register">Need an account? Register</a>

            </div>
          </div>

        </form>

      </nz-card>

    </nz-col>
  </nz-row>
</div>
