<div class="fade-in">
    <div nz-row [nzGutter]="24">
        <!-- CREATE STAFF -->
        <div nz-col [nzXs]="24" [nzMd]="8" class="mb-24">
            <nz-card nzTitle="Create New Staff" class="form-card">
                <form nz-form [formGroup]="createUserForm" nzLayout="vertical">
                    <nz-form-item>
                        <nz-form-label nzRequired>Full Name</nz-form-label>
                        <nz-form-control nzErrorTip="Name is required">
                            <input nz-input formControlName="name" />
                        </nz-form-control>
                    </nz-form-item>

                    <nz-form-item>
                        <nz-form-label nzRequired>Email Address</nz-form-label>
                        <nz-form-control nzErrorTip="Valid email required">
                            <input nz-input type="email" formControlName="email" />
                        </nz-form-control>
                    </nz-form-item>

                    <nz-form-item>
                        <nz-form-label nzRequired>Password</nz-form-label>
                        <nz-form-control nzErrorTip="Min 6 characters">
                            <input nz-input type="password" formControlName="password" />
                        </nz-form-control>
                    </nz-form-item>

                    <div class="form-actions">
                        <button nz-button nzType="primary" nzBlock [nzLoading]="loading()" (click)="createAgent()">
                            Add as Agent
                        </button>
                        <button nz-button nzBlock [nzLoading]="loading()" (click)="createClaimsOfficer()">
                            Add as Claims Officer
                        </button>
                    </div>
                </form>
            </nz-card>
        </div>

        <!-- STAFF LIST -->
        <div nz-col [nzXs]="24" [nzMd]="16">
            <nz-card nzTitle="Current Workforce">
                <nz-table #staffTable [nzData]="agentsWithWorkload()" nzSize="small">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        @for (a of agentsWithWorkload(); track a.id) {
                        <tr>
                            <td>{{ a.name }}</td>
                            <td>{{ a.email }}</td>
                            <td><nz-tag nzColor="blue">Agent</nz-tag></td>
                            <td>
                                <button nz-button nzType="text" (click)="openEditModal(a)">
                                    <i nz-icon nzType="edit"></i>
                                </button>
                                <button nz-button nzType="text" nzDanger nz-popconfirm nzPopconfirmTitle="Delete user?"
                                    (nzOnConfirm)="deleteUser(a.id)">
                                    <i nz-icon nzType="delete"></i>
                                </button>
                            </td>
                        </tr>
                        }
                        @for (o of officersWithWorkload(); track o.id) {
                        <tr>
                            <td>{{ o.name }}</td>
                            <td>{{ o.email }}</td>
                            <td><nz-tag nzColor="orange">Claims Officer</nz-tag></td>
                            <td>
                                <button nz-button nzType="text" (click)="openEditModal(o)">
                                    <i nz-icon nzType="edit"></i>
                                </button>
                                <button nz-button nzType="text" nzDanger nz-popconfirm nzPopconfirmTitle="Delete user?"
                                    (nzOnConfirm)="deleteUser(o.id)">
                                    <i nz-icon nzType="delete"></i>
                                </button>
                            </td>
                        </tr>
                        }
                    </tbody>
                </nz-table>
            </nz-card>
        </div>
    </div>
</div>

<!-- EDIT MODAL -->
<nz-modal [(nzVisible)]="isEditModalVisible" nzTitle="Edit User" (nzOnCancel)="isEditModalVisible.set(false)"
    (nzOnOk)="updateUser()">
    <ng-container *nzModalContent>
        <form nz-form [formGroup]="editUserForm" nzLayout="vertical">
            <nz-form-item>
                <nz-form-label>Name</nz-form-label>
                <nz-form-control>
                    <input nz-input formControlName="name" />
                </nz-form-control>
            </nz-form-item>
            <nz-form-item>
                <nz-form-label>Email</nz-form-label>
                <nz-form-control>
                    <input nz-input formControlName="email" />
                </nz-form-control>
            </nz-form-item>
            <nz-form-item>
                <nz-form-label>Phone</nz-form-label>
                <nz-form-control>
                    <input nz-input formControlName="phone" />
                </nz-form-control>
            </nz-form-item>
        </form>
    </ng-container>
</nz-modal>
