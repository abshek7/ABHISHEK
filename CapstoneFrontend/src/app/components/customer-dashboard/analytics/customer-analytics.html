<div class="analytics-container fade-in">
    <div nz-row [nzGutter]="16">
        <div nz-col [nzSpan]="12">
            <nz-card nzTitle="Policy Overview">
                <div class="stat-grid">
                    <div class="grid-item">
                        <span>Active Policies</span>
                        <b>{{ policies().length }}</b>
                    </div>
                </div>
            </nz-card>
        </div>
        <div nz-col [nzSpan]="12">
            <nz-card nzTitle="Claims Summary">
                <div class="stat-grid">
                    <div class="grid-item">
                        <span>Total Claims</span>
                        <b>{{ claims().length }}</b>
                    </div>
                    <div class="grid-item">
                        <span>In Progress</span>
                        <b class="orange">{{ inProgressClaimsCount() }}</b>
                    </div>
                </div>
            </nz-card>
        </div>
    </div>
</div>
