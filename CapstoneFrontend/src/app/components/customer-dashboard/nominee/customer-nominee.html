<div class="component-container">
  <nz-card [nzBordered]="false" class="premium-form-card">
    <div class="form-intro">
      <p>Please register a nominee for your policy to ensure smooth disbursement of benefits in unforeseen
        circumstances.</p>
    </div>

    <nz-divider></nz-divider>

    <form nz-form [formGroup]="form" nzLayout="vertical">
      <div nz-row [nzGutter]="24">
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired>Target Policy</nz-form-label>
            <nz-form-control nzErrorTip="Please select a policy">
              <nz-select formControlName="policyId" nzShowSearch nzPlaceHolder="Select a policy number...">
                @for (p of policies(); track p.id) {
                <nz-option [nzValue]="p.id" [nzLabel]="p.policyNumber + ' (' + p.policyTypeName + ')'"></nz-option>
                }
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired>Nominee Full Name</nz-form-label>
            <nz-form-control nzErrorTip="Full name is required">
              <input nz-input formControlName="name" placeholder="As per legal documents" />
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>

      <div nz-row [nzGutter]="24">
        <div nz-col [nzSpan]="8">
          <nz-form-item>
            <nz-form-label nzRequired>Relationship</nz-form-label>
            <nz-form-control>
              <nz-select formControlName="relationship" nzPlaceHolder="Select relationship">
                <nz-option nzValue="Spouse" nzLabel="Spouse"></nz-option>
                <nz-option nzValue="Child" nzLabel="Child"></nz-option>
                <nz-option nzValue="Parent" nzLabel="Parent"></nz-option>
                <nz-option nzValue="Sibling" nzLabel="Sibling"></nz-option>
                <nz-option nzValue="Other" nzLabel="Other"></nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="8">
          <nz-form-item>
            <nz-form-label nzRequired>Date of Birth</nz-form-label>
            <nz-form-control>
              <nz-date-picker formControlName="dateOfBirth" style="width: 100%"></nz-date-picker>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="8">
          <nz-form-item>
            <nz-form-label nzRequired>Contact Phone</nz-form-label>
            <nz-form-control nzErrorTip="Valid phone number is required">
              <input nz-input formControlName="phone" placeholder="+1 (555) 000-0000" />
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>

      <div class="form-actions">
        <button nz-button nzType="primary" nzSize="large" [nzLoading]="loading()" (click)="submitNominee()"
          [disabled]="form.invalid">
          Register Nominee
        </button>
      </div>
    </form>
  </nz-card>
</div>
